services:
  air-parser:
    build:
      context: .
      dockerfile: Dockerfile
    image: air-parser:3.0.0
    container_name: parser.air
    ports:
      - "9103:9103"
    volumes:
      - air-parser-data:/data
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9103/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  air-parser-data:
