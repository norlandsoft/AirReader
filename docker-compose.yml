services:
  air-reader:
    build:
      context: .
      dockerfile: Dockerfile
    image: air-reader:latest
    container_name: reader.air
    ports:
      - "9103:8000"
    environment:
      - JAVA_OPTS=-Xmx4g -Xms512m -XX:+UseSerialGC
    volumes:
      - air-reader-data:/data
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  air-reader-data:
