services:
  air-reader:
    build:
      context: .
      dockerfile: Dockerfile
    image: air-reader:3.0.0
    container_name: reader.air
    ports:
      - "9103:8000"
    volumes:
      - air-reader-data:/data
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  air-reader-data:
