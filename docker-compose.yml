services:
  air-filereader:
    build:
      context: .
      dockerfile: Dockerfile
    image: air-filereader:latest
    container_name: filereader.air
    ports:
      - "9103:8000"
    environment:
      - JAVA_HOME=/usr/lib/jvm/temurin-21-jdk-amd64
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
